apis:
- aid: airbus-oneatlas:oneatlas-data-living-library
  name: OneAtlas Data Living Library
  tags:
  - Airbus
  - Geospatial
  - Imagery
  - Remote Sensing
  - Satellites
  - Satellite Imagery
  - Streaming
  humanURL: >-
    https://api.oneatlas.airbus.com/api-catalog-v2/oad-living-library/overview/index.html
  properties:
  - url: >-
      https://api.oneatlas.airbus.com/api-catalog-v2/oad-living-library/tutorials/
    name: OneAtlas Data - Living Library
    type: Tutorials
    description: 'null'
  - url: >-
      https://api.oneatlas.airbus.com/api-catalog-v2/oad-living-library/notebooks/
    name: OneAtlas Data Living Library Notebooks & Postman collections
    type: PostmanCollection
    description: 'null'
  - url: >-
      https://api.oneatlas.airbus.com/api-catalog-v2/oad-living-library/notebooks/
    name: OneAtlas Data Living Library Notebooks & Postman collections
    type: JupyterNotebook
    description: 'null'
  - url: https://api.oneatlas.airbus.com/releases/#oad-living-library
    name: Releases
    type: ChangeLog
    description: 'null'
  description: >-
    OneAtlas Data Living Library is a platform that provides users with access to
    a diverse range of geospatial data and satellite imagery. The library is constantly
    updated with the latest data, ensuring that users have access to accurate and
    timely information for their projects. Users can easily search for and find
    the data they need, whether it be for environmental monitoring, urban planning,
    agriculture, or any other application.
  features:
  - Search and stream satellite imagery from a continuously updated library
  - Filter by date range, cloud cover, and area of interest
  - Access optical imagery from Pleiades, SPOT, and third-party satellites
  - Jupyter notebook and Postman collection support
- aid: airbus-oneatlas:oneatlas-data-pay-per-order-api
  name: OneAtlas Data Pay-Per-Order API
  tags:
  - Airbus
  - Archives
  - Geospatial
  - Imagery
  - Pay-Per-Order
  - Satellites
  - Satellite Imagery
  humanURL: >-
    https://api.oneatlas.airbus.com/api-catalog-v2/oad-ppo-archives/overview/index.html
  properties:
  - url: >-
      https://api.oneatlas.airbus.com/api-catalog-v2/oad-ppo-archives/tutorials/
    name: OneAtlas Data - Pay-Per-Order Archives
    type: Tutorials
    description: 'null'
  - url: >-
      https://api.oneatlas.airbus.com/api-catalog-v2/oad-ppo-archives/notebooks/
    name: OneAtlas Data pay-per-order archives Notebooks & Postman collections
    type: PostmanCollection
    description: 'null'
  - url: >-
      https://api.oneatlas.airbus.com/api-catalog-v2/oad-ppo-archives/notebooks/
    name: OneAtlas Data pay-per-order archives Notebooks & Postman collections
    type: JupyterNotebook
    description: 'null'
  - url: https://api.oneatlas.airbus.com/releases/#oad-pay-per-order-archives
    name: Releases
    type: ChangeLog
    description: 'null'
  description: >-
    The OneAtlas Data Pay-Per-Order API is a powerful tool that enables users to
    access and purchase high-resolution satellite imagery, elevation data, and other
    geospatial information on a pay-as-you-go basis. By integrating this API into
    their applications or systems, users can quickly and easily obtain the precise
    data they need for their projects without committing to long-term subscriptions
    or contracts.
  features:
  - Purchase and download archived satellite imagery on demand
  - Pay-as-you-go pricing with no subscription commitment
  - Access to historical imagery archive with global coverage
  - Multiple delivery formats and resolution options
- aid: airbus-oneatlas:oneatlas-data-pay-per-order-tasking-api
  name: OneAtlas Data Pay-Per-Order Tasking API
  tags:
  - Airbus
  - Geospatial
  - Imagery
  - Pay-Per-Order
  - Satellites
  - Satellite Imagery
  - Tasking
  humanURL: >-
    https://api.oneatlas.airbus.com/api-catalog-v2/oad-ppo-tasking/overview/index.html
  properties:
  - url: >-
      https://api.oneatlas.airbus.com/api-catalog-v2/oad-ppo-tasking/tutorials/
    name: OneAtlas Data - Tasking
    type: Tutorials
    description: 'null'
  - url: >-
      https://api.oneatlas.airbus.com/api-catalog-v2/oad-ppo-tasking/notebooks/
    name: OneAtlas Data pay-per-order tasking Notebooks & Postman collections
    type: PostmanCollection
    description: 'null'
  - url: >-
      https://api.oneatlas.airbus.com/api-catalog-v2/oad-ppo-tasking/notebooks/
    name: OneAtlas Data pay-per-order tasking Notebooks & Postman collections
    type: JupyterNotebook
    description: 'null'
  - url: https://api.oneatlas.airbus.com/releases/#oad-pay-per-order-tasking
    name: Releases
    type: ChangeLog
    description: 'null'
  description: >-
    The OneAtlas Data Pay-Per-Order Tasking API allows users to directly request
    high-resolution satellite imagery of specific locations at their convenience.
    With this API, users can easily select areas of interest, order and pay for
    the data they need, and receive the requested imagery quickly and efficiently.
    This tool enables users to access up-to-date satellite data for a wide range
    of applications, such as environmental monitoring, agriculture, urban planning,
    and disaster response.
  features:
  - Commission new satellite imagery acquisitions of specific locations
  - Select acquisition parameters including resolution and urgency
  - Track tasking order status and estimated delivery
  - Access to Pleiades Neo and Pleiades satellite fleet
- aid: airbus-oneatlas:oneatlas-basemap-api
  name: OneAtlas Basemap API
  tags:
  - Airbus
  - Basemap
  - Geospatial
  - Imagery
  - Maps
  - Satellites
  - Tiles
  humanURL: >-
    https://api.oneatlas.airbus.com/api-catalog-v2/oad-basemap/overview/index.html
  properties:
  - url: >-
      https://api.oneatlas.airbus.com/api-catalog-v2/oad-basemap/tutorials/#basemap-access
    name: OneAtlas Basemap - Tutorials
    type: Tutorials
    description: 'null'
  - url: https://api.oneatlas.airbus.com/api-catalog-v2/oad-basemap/notebooks/
    name: OneAtlas Data Basemap Notebooks & Postman collections
    type: PostmanCollection
    description: 'null'
  - url: https://api.oneatlas.airbus.com/api-catalog-v2/oad-basemap/notebooks/
    name: OneAtlas Data Basemap Notebooks & Postman collections
    type: JupyterNotebook
    description: 'null'
  - url: https://api.oneatlas.airbus.com/releases/#oad-basemap
    name: Releases
    type: ChangeLog
    description: 'null'
  description: >-
    OneAtlas Basemap API is a geospatial service that provides access to high-resolution
    satellite imagery and basemaps. It allows users to retrieve up-to-date visual
    information of any location on Earth, enabling them to analyze and monitor changes
    in the environment, infrastructure, and land use.
  features:
  - Access global seamless basemap tiles built from Airbus satellite imagery
  - Standard XYZ tile service compatible with mapping libraries
  - Multiple basemap styles and zoom levels
- aid: airbus-oneatlas:oneatlas-radar-api
  name: OneAtlas Radar API
  tags:
  - Airbus
  - Geospatial
  - Imagery
  - Radar
  - SAR
  - Satellites
  - Tasking
  humanURL: https://api.oneatlas.airbus.com/api-catalog-v2/radar/overview/index.html
  properties:
  - url: https://api.oneatlas.airbus.com/api-catalog-v2/radar/tutorials/
    name: Radar Tasking & Archive - API
    type: Tutorials
    description: 'null'
  - url: https://api.oneatlas.airbus.com/api-catalog-v2/radar/notebooks/
    name: Radar Notebooks & Postman collections
    type: JupyterNotebook
    description: 'null'
  - url: https://api.oneatlas.airbus.com/api-catalog-v2/radar/notebooks/
    name: Radar Notebooks & Postman collections
    type: PostmanCollection
    description: 'null'
  - url: https://api.oneatlas.airbus.com/releases/#radar
    name: Releases
    type: ChangeLog
    description: 'null'
  description: >-
    OneAtlas Radar API is a powerful tool that allows developers to access and integrate
    radar satellite data into their applications and processes. By utilizing this
    API, users can access real-time and historical radar imagery, which can be used
    for a wide range of applications including agriculture, disaster management,
    urban planning, and security.
  features:
  - Access SAR (synthetic aperture radar) imagery from Airbus radar satellites
  - Supports both archive search and new tasking acquisitions
  - All-weather, day-night imaging capability
  - Multiple polarization modes and resolutions
- aid: airbus-oneatlas:oneatlas-worlddem-api
  name: OneAtlas WorldDEM API
  tags:
  - Airbus
  - Digital Elevation Model
  - Elevation
  - Geospatial
  - Imagery
  - Satellites
  - Terrain
  humanURL: >-
    https://api.oneatlas.airbus.com/api-catalog-v2/worlddem/overview/index.html
  properties:
  - url: https://api.oneatlas.airbus.com/api-catalog-v2/worlddem/tutorials/
    name: WorldDEM - API
    type: Tutorials
    description: 'null'
  - url: https://api.oneatlas.airbus.com/api-catalog-v2/worlddem/notebooks/
    name: WorldDEM Notebooks & Postman collections
    type: JupyterNotebook
    description: 'null'
  - url: https://api.oneatlas.airbus.com/api-catalog-v2/worlddem/notebooks/
    name: WorldDEM Notebooks & Postman collections
    type: PostmanCollection
    description: 'null'
  - url: https://api.oneatlas.airbus.com/releases/#worlddem
    name: Releases
    type: ChangeLog
    description: 'null'
  - url: properties/oneatlas-worlddem-api-openapi.yml
    type: OpenAPI
  description: >-
    The OneAtlas WorldDEM API is a tool that provides access to high-resolution
    global elevation data. This data, collected by satellites and processed using
    advanced technologies, offers a detailed and accurate representation of the
    Earth's surface. By integrating the WorldDEM API into their applications, users
    can benefit from precise terrain information for a wide range of use cases,
    such as urban planning, disaster response, agriculture, and infrastructure development.
  features:
  - Access global digital elevation model data at up to 12m resolution
  - Derived from TanDEM-X satellite radar interferometry
  - Point elevation queries and area elevation profiles
  - Used for terrain analysis, flood modeling, and infrastructure planning
